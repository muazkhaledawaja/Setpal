<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Setpal — The coaching platform for MENA</title>
<link rel="icon" type="image/svg+xml" href="/landing/favicon.svg" />
<link rel="stylesheet" href="/landing/styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
  a{color:inherit;}
  i[data-lucide]{stroke-width:2;}
  h1,h2,h3{margin:0;}

  .lp-root{--lp-accent:#1f6b6e;--lp-r-card:.625rem;--lp-r-btn:.375rem;}
  .lp-wrap,.lp-nav-inner,.lp-section,.lp-hero,.lp-footer{max-width:1120px;margin-inline:auto;padding-inline:24px;}

  /* buttons */
  .lp-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:var(--lp-r-btn);
    font-family:var(--font-sans);font-weight:500;font-size:14px;text-decoration:none;cursor:pointer;border:1px solid transparent;
    height:2.5rem;padding:0 1.1rem;transition:filter .15s,background-color .15s,border-color .15s,color .15s;white-space:nowrap;}
  .lp-btn-sm{height:2.25rem;padding:0 .9rem;}
  .lp-btn-lg{height:3rem;padding:0 1.6rem;font-size:15px;}
  .lp-btn-block{width:100%;}
  .lp-btn-primary{background:var(--lp-accent);color:var(--primary-foreground);}
  .lp-btn-primary:hover{filter:brightness(.92);}
  .lp-btn-ghost{background:transparent;color:var(--foreground);}
  .lp-btn-ghost:hover{background:var(--secondary);}
  .lp-btn-outline{background:var(--card);color:var(--foreground);border-color:var(--border);}
  .lp-btn-outline:hover{border-color:var(--lp-accent);color:var(--lp-accent);}

  /* nav */
  .lp-nav{position:sticky;top:0;z-index:50;background:color-mix(in oklab,var(--background) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
  .lp-nav-inner{display:flex;align-items:center;justify-content:space-between;height:4.25rem;gap:1.5rem;}
  .lp-logo{font-family:var(--font-serif);font-weight:600;font-size:22px;letter-spacing:-0.02em;color:var(--lp-accent);}
  .lp-nav-links{display:flex;gap:1.75rem;font-size:14px;font-weight:500;color:var(--muted-foreground);}
  .lp-nav-links a{text-decoration:none;transition:color .15s;}
  .lp-nav-links a:hover{color:var(--foreground);}
  .lp-nav-right{display:flex;align-items:center;gap:1rem;}
  .lp-lang{display:inline-flex;align-items:center;gap:.4rem;background:transparent;border:1px solid var(--border);border-radius:var(--lp-r-btn);
    height:2.25rem;padding:0 .75rem;font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--foreground);cursor:pointer;transition:background-color .15s;}
  .lp-lang:hover{background:var(--secondary);}
  .lp-link-signin{font-size:14px;font-weight:500;text-decoration:none;color:var(--foreground);}
  .lp-link-signin:hover{color:var(--lp-accent);}

  /* hero */
  .lp-hero{display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:center;padding-top:5rem;padding-bottom:5rem;}
  .lp-hero.is-centered{grid-template-columns:1fr;text-align:center;justify-items:center;gap:2.5rem;}
  .lp-eyebrow{display:inline-block;font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--lp-accent);margin-bottom:1rem;}
  .lp-hero-title{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.02em;font-size:clamp(34px,4.6vw,56px);line-height:1.05;white-space:pre-line;}
  .lp-hero-sub{font-size:18px;line-height:1.6;color:var(--muted-foreground);margin:1.4rem 0 0;max-width:34ch;}
  .lp-hero.is-centered .lp-hero-sub{max-width:52ch;}
  .lp-hero-cta{display:flex;gap:.75rem;margin-top:2rem;flex-wrap:wrap;}
  .lp-hero.is-centered .lp-hero-cta{justify-content:center;}
  .lp-hero-note{display:flex;align-items:center;gap:.45rem;margin-top:1.25rem;font-size:13px;color:var(--muted-foreground);}
  .lp-hero-note i{color:var(--success);}
  .lp-hero.is-centered .lp-hero-note{justify-content:center;}
  .lp-hero.is-centered .lp-hero-visual{width:100%;max-width:820px;}

  /* app mock */
  .lp-mock{background:var(--card);border:1px solid var(--border);border-radius:calc(var(--lp-r-card) + .25rem);box-shadow:0 24px 60px -20px oklch(0.22 0.02 200 / 0.22);overflow:hidden;}
  .lp-mock-bar{display:flex;gap:.4rem;padding:.7rem .9rem;border-bottom:1px solid var(--border);background:var(--muted);}
  .lp-dot{width:.7rem;height:.7rem;border-radius:50%;}
  .lp-mock-body{display:flex;min-height:340px;}
  .lp-mock-side{width:56px;background:var(--sidebar);border-inline-end:1px solid var(--sidebar-border);display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:.75rem 0;}
  .lp-mock-brand{font-family:var(--font-serif);font-weight:700;font-size:13px;color:var(--lp-accent);margin-bottom:.5rem;}
  .lp-mock-nav{width:34px;height:34px;border-radius:.5rem;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);}
  .lp-mock-nav.on{background:var(--lp-accent);color:var(--primary-foreground);}
  .lp-mock-main{flex:1;padding:1.1rem 1.25rem;}
  .lp-mock-h{font-family:var(--font-serif);font-weight:600;font-size:18px;margin-bottom:.9rem;}
  .lp-mock-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.1rem;}
  .lp-mock-stat{border:1px solid var(--border);border-radius:.5rem;padding:.6rem .7rem;}
  .lp-mock-stat-top{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted-foreground);}
  .lp-mock-stat-v{font-family:var(--font-serif);font-weight:600;font-size:22px;margin-top:.25rem;line-height:1;}
  .lp-mock-recent{font-size:12px;font-weight:600;color:var(--muted-foreground);margin-bottom:.5rem;}
  .lp-mock-list{border:1px solid var(--border);border-radius:.5rem;overflow:hidden;}
  .lp-mock-row{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-bottom:1px solid var(--border);}
  .lp-mock-row:last-child{border-bottom:none;}
  .lp-mock-ava{width:28px;height:28px;border-radius:50%;background:var(--lp-accent);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
  .lp-mock-row-id{flex:1;}
  .lp-mock-name{font-size:12px;font-weight:500;}
  .lp-mock-meta{font-size:10px;color:var(--muted-foreground);}
  .lp-mock-pill{font-size:10px;font-weight:600;padding:.1rem .45rem;border-radius:.3rem;}
  .lp-mock-pill.active{background:var(--success);color:var(--success-foreground);}
  .lp-mock-pill.paused{background:var(--warning);color:var(--warning-foreground);}

  /* sections */
  .lp-section{padding-top:5rem;padding-bottom:1rem;}
  .lp-section-head{max-width:620px;margin-bottom:2.5rem;}
  .is-centered ~ main .lp-section-head,.lp-section-head{}
  .lp-section-head h2{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.02em;font-size:clamp(26px,3vw,36px);line-height:1.1;}
  .lp-section-head p{font-size:17px;color:var(--muted-foreground);margin:.75rem 0 0;line-height:1.5;}

  .lp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--lp-r-card);box-shadow:var(--shadow-sm);}

  /* features */
  .lp-feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;}
  .lp-feat{padding:1.6rem;}
  .lp-feat-ic{width:46px;height:46px;border-radius:var(--lp-r-btn);background:color-mix(in oklab,var(--lp-accent) 12%,transparent);color:var(--lp-accent);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem;}
  .lp-feat h3{font-family:var(--font-serif);font-weight:600;font-size:19px;}
  .lp-feat p{font-size:15px;line-height:1.6;color:var(--muted-foreground);margin:.6rem 0 0;}

  /* how */
  .lp-how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;}
  .lp-step{position:relative;}
  .lp-step-n{font-family:var(--font-serif);font-weight:600;font-size:18px;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--lp-accent);color:var(--lp-accent);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem;background:var(--background);position:relative;z-index:2;}
  .lp-step h3{font-family:var(--font-serif);font-weight:600;font-size:19px;}
  .lp-step p{font-size:15px;line-height:1.6;color:var(--muted-foreground);margin:.55rem 0 0;}
  .lp-step-line{position:absolute;top:22px;inset-inline-start:44px;inset-inline-end:-1.75rem;height:1.5px;background:var(--border);z-index:1;}

  /* mena */
  .lp-mena{display:grid;grid-template-columns:1.4fr 1fr;gap:2.5rem;align-items:center;padding:3rem;background:color-mix(in oklab,var(--lp-accent) 7%,var(--card));}
  .lp-mena-copy h2{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.02em;font-size:clamp(24px,2.6vw,32px);line-height:1.12;margin-top:.5rem;}
  .lp-mena-copy p{font-size:16px;line-height:1.6;color:var(--muted-foreground);margin:1rem 0 0;}
  .lp-mena-points{list-style:none;padding:0;margin:1.5rem 0 0;display:flex;flex-direction:column;gap:.7rem;}
  .lp-mena-points li{display:flex;align-items:center;gap:.6rem;font-size:15px;font-weight:500;}
  .lp-mena-points li i{color:var(--lp-accent);}
  .lp-mena-glyph{display:flex;align-items:center;justify-content:center;gap:1rem;}
  .lp-glyph-ar,.lp-glyph-en{width:96px;height:96px;border-radius:var(--lp-r-card);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:46px;font-weight:600;}
  .lp-glyph-ar{background:var(--lp-accent);color:var(--primary-foreground);}
  .lp-glyph-en{background:var(--card);border:1px solid var(--border);color:var(--foreground);}
  .lp-glyph-swap{color:var(--muted-foreground);}

  /* pricing */
  .lp-price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.1rem;align-items:start;}
  .lp-price{padding:1.6rem 1.4rem;position:relative;display:flex;flex-direction:column;gap:.5rem;}
  .lp-price.is-pop{border-color:var(--lp-accent);box-shadow:0 16px 40px -16px color-mix(in oklab,var(--lp-accent) 40%,transparent);}
  .lp-price-badge{position:absolute;top:-.7rem;inset-inline-start:1.4rem;background:var(--lp-accent);color:var(--primary-foreground);font-size:11px;font-weight:600;padding:.2rem .6rem;border-radius:var(--radius-full);}
  .lp-price-name{font-family:var(--font-serif);font-weight:600;font-size:18px;}
  .lp-price-amt{font-family:var(--font-serif);font-weight:600;font-size:34px;line-height:1;}
  .lp-price-per{font-family:var(--font-sans);font-size:14px;font-weight:400;color:var(--muted-foreground);margin-inline-start:.2rem;}
  .lp-price-desc{font-size:14px;color:var(--muted-foreground);}
  .lp-price-limit{display:flex;align-items:center;gap:.4rem;font-size:13px;color:var(--foreground);padding:.6rem 0;border-top:1px solid var(--border);margin-top:.4rem;}
  .lp-price-limit i{color:var(--lp-accent);}
  .lp-price .lp-btn{margin-top:.4rem;}

  /* faq */
  .lp-faq-list{display:flex;flex-direction:column;gap:.75rem;max-width:760px;}
  .lp-faq-item{padding:1.1rem 1.3rem;cursor:pointer;transition:border-color .15s;}
  .lp-faq-item:hover{border-color:var(--lp-accent);}
  .lp-faq-q{display:flex;align-items:center;justify-content:space-between;gap:1rem;font-size:16px;font-weight:600;}
  .lp-faq-q i{color:var(--lp-accent);flex-shrink:0;}
  .lp-faq-a{font-size:15px;line-height:1.6;color:var(--muted-foreground);margin:.8rem 0 0;}

  /* footer */
  .lp-footer{padding-top:5rem;padding-bottom:3rem;}
  .lp-footer-cta{text-align:center;padding:3.5rem 2rem;background:color-mix(in oklab,var(--lp-accent) 9%,var(--card));}
  .lp-footer-cta h2{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.02em;font-size:clamp(26px,3vw,38px);}
  .lp-footer-cta p{font-size:17px;color:var(--muted-foreground);margin:.85rem 0 1.8rem;}
  .lp-footer-bottom{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-top:2.5rem;padding-top:1.75rem;border-top:1px solid var(--border);flex-wrap:wrap;}
  .lp-footer-copy{font-size:13px;color:var(--muted-foreground);}

  /* responsive */
  @media (max-width:900px){
    .lp-hero{grid-template-columns:1fr;gap:2.5rem;padding-top:3.5rem;}
    .lp-hero-sub{max-width:none;}
    .lp-feat-grid{grid-template-columns:1fr 1fr;}
    .lp-how-grid{grid-template-columns:1fr;gap:1.25rem;}
    .lp-step-line{display:none;}
    .lp-mena{grid-template-columns:1fr;text-align:center;padding:2.25rem;}
    .lp-mena-points{align-items:center;}
    .lp-mena-glyph{order:-1;}
    .lp-price-grid{grid-template-columns:1fr 1fr;}
    .lp-nav-links{display:none;}
  }
  @media (max-width:560px){
    .lp-feat-grid,.lp-price-grid{grid-template-columns:1fr;}
    .lp-hero-cta{flex-direction:column;align-items:stretch;}
    .lp-link-signin{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="/landing/copy.js"></script>
<script type="text/babel" src="/landing/tweaks-panel.jsx"></script>
<script type="text/babel" src="/landing/app.jsx"></script>
</body>
</html>
