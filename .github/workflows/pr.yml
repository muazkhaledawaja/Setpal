name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    services:
      # supabase/postgres ships with pgcrypto, uuid-ossp, the auth schema,
      # auth.uid() stub, and all other Supabase-specific extensions pre-loaded.
      # Plain postgres:15 is missing these and cannot run Supabase migrations.
      postgres:
        image: supabase/postgres:15.8.1.060
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Check for changed migration files
        id: changed
        run: |
          {
            echo "files<<EOF"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'supabase/migrations/*.sql'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run all migrations against test DB
        if: steps.changed.outputs.files != ''
        run: |
          # supabase/postgres image: supabase_admin owns public/auth/extensions/vault schemas.
          # TCP password auth for supabase_admin is unreliable across image versions.
          # Instead: copy each migration into the container and run via docker exec as the
          # supabase_admin OS user, which peer-authenticates over the Unix socket (no password).
          CONTAINER_ID=$(docker ps --filter "ancestor=supabase/postgres:15.8.1.060" --format "{{.ID}}")

          for file in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying: $file"
            # Strip Cloud-managed lines before copying into container
            sed -e '/^COMMENT ON SCHEMA "public"/d' \
                -e '/^ALTER PUBLICATION "supabase_realtime"/d' \
                "$file" > /tmp/migration.sql
            docker cp /tmp/migration.sql "$CONTAINER_ID:/tmp/migration.sql"
            docker exec -u supabase_admin "$CONTAINER_ID" \
              psql -U supabase_admin -d testdb --set ON_ERROR_STOP=1 -f /tmp/migration.sql
          done

      - name: No migration files changed
        if: steps.changed.outputs.files == ''
        run: echo "No migration files changed in this PR — skipping check."
