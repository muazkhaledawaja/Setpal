name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    services:
      # supabase/postgres ships with pgcrypto, uuid-ossp, the auth schema,
      # auth.uid() stub, and all other Supabase-specific extensions pre-loaded.
      # Plain postgres:15 is missing these and cannot run Supabase migrations.
      postgres:
        image: supabase/postgres:15.8.1.060
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Check for changed migration files
        id: changed
        run: |
          {
            echo "files<<EOF"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'supabase/migrations/*.sql'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Grant postgres CREATE on public schema
        run: |
          # In supabase/postgres, supabase_admin owns the public schema, not postgres.
          # postgres has USAGE but not CREATE, so DDL fails. We use docker exec to run
          # as the container's postgres OS user, which peer-authenticates as postgres
          # over the Unix socket. As a superuser, postgres can then grant itself CREATE.
          CONTAINER_ID=$(docker ps --filter "ancestor=supabase/postgres:15.8.1.060" --format "{{.ID}}")
          docker exec -u postgres "$CONTAINER_ID" \
            psql -U postgres -d testdb \
              -c "GRANT ALL ON SCHEMA public TO postgres;"

      - name: Run all migrations against test DB
        if: steps.changed.outputs.files != ''
        env:
          PGPASSWORD: testpassword
        run: |
          # Strip lines only supabase_admin can run (schema comment, publication ownership).
          # These are pg_dump artifacts that Supabase Cloud manages out-of-band.
          for file in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying: $file"
            sed -e '/^COMMENT ON SCHEMA "public"/d' \
                -e '/^ALTER PUBLICATION "supabase_realtime"/d' \
                "$file" \
            | psql -h localhost -p 5432 -U postgres -d testdb --set ON_ERROR_STOP=1
          done

      - name: No migration files changed
        if: steps.changed.outputs.files == ''
        run: echo "No migration files changed in this PR — skipping check."
